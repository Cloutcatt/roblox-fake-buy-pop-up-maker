<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roblox Prompt Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  body {
    background-color: #121314;
    color: #ffffff;
    font-family: 'Arial', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    gap: 30px;
  }

  /* Control Panel */
  .control-panel {
    background-color: #1e2022;
    padding: 20px;
    border-radius: 8px;
    width: 400px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .control-group label {
    font-size: 13px;
    color: #a0a0a0;
    font-weight: bold;
  }
  .control-panel input {
    padding: 8px;
    background-color: #2b2d30;
    border: 1px solid #444;
    border-radius: 4px;
    color: white;
    font-size: 14px;
  }

  /* Download Button Styling */
  .btn-download {
    margin-top: 5px;
    padding: 12px;
    background-color: #0084ff;
    color: white;
    border: none;
    border-radius: 4px;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-download:hover {
    background-color: #0066d6;
  }

  /* Prompt Panel */
  .roblox-prompt {
    width: 420px;
    background-color: #232527;
    border-radius: 8px;
    padding: 20px;
    color: #FFFFFF;
    text-align: center;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.6);
    box-sizing: border-box;
  }
  .header {
    font-size: 19px;
    font-weight: bold;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }
  .line {
    height: 1px;
    background-color: #393B3D;
    margin-bottom: 25px;
    width: 100%;
  }
  
  /* Borderless Image Container */
  .icon-circle {
    width: 90px;
    height: 90px;
    border: none;
    border-radius: 50%;
    margin: 0 auto 25px auto;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    background-color: #1b1d1f;
  }
  .icon-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }
  
  .prompt-text {
    font-size: 16px;
    color: #BDC3C7;
    margin-bottom: 30px;
    line-height: 1.4;
    word-break: break-word; /* Wrap characters nicely just in case */
  }
  .item-name {
    color: #FFFFFF;
    font-weight: bold;
  }
  
  /* Action Buttons */
  .buttons {
    display: flex;
    justify-content: space-between;
    gap: 15px;
  }
  .btn-cancel {
    flex: 1;
    padding: 12px;
    background: transparent;
    border: 1px solid #555759;
    border-radius: 6px;
    color: #FFFFFF;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }
  .btn-buy {
    flex: 1;
    padding: 12px;
    background-color: #FFFFFF;
    border: none;
    border-radius: 6px;
    color: #000000;
    font-size: 16px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    min-width: 0; /* Prevents overflow inside flexing row layouts */
  }
  
  /* SVG Icon adjustments */
  .robux-svg {
    width: 22px;
    height: 22px;
    display: inline-block;
    vertical-align: middle;
    flex-shrink: 0;
  }
  
  /* Prevent numerical text string popping out of container boxes */
  #output-price {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
</style>
</head>
<body>

  <div class="control-panel">
    <div class="control-group">
      <label for="input-name">Item Name (Max 40 Letters)</label>
      <input type="text" id="input-name" value="" maxlength="40" placeholder="Type tool name...">
    </div>
    <div class="control-group">
      <label for="input-price">Robux Cost (Max 14 Digits)</label>
      <input type="number" id="input-price" value="" min="0" max="99999999999999" placeholder="Type price...">
    </div>
    <div class="control-group">
      <label for="input-file">Upload Tool Icon (.png / .jpg)</label>
      <input type="file" id="input-file" accept="image/*">
    </div>
    <button class="btn-download" id="btn-download">Download Image</button>
  </div>

  <div class="roblox-prompt" id="roblox-prompt">
    <div class="header">Buy Item</div>
    <div class="line"></div>
    
    <div class="icon-circle">
      <img id="output-image" src="" alt="Icon">
    </div> 
    
    <div class="prompt-text">Would you like to buy <span id="output-name" class="item-name">""</span>?</div>
    
    <div class="buttons">
      <button class="btn-cancel">Cancel</button>
      <button class="btn-buy">
        <svg class="robux-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 2L93.3 27V77L50 102L6.7 77V27L50 2Z" fill="#232527"/>
          <path d="M50 14L81.2 32V68L50 86L18.8 68V32L50 14Z" fill="#FFFFFF"/>
          <path d="M50 22L74.3 36V64L50 78L25.7 64V36L50 22Z" fill="#232527"/>
          <rect x="38" y="38" width="24" height="24" fill="#FFFFFF"/>
        </svg>
        <span id="output-price"></span>
      </button>
    </div>
  </div>

<script>
  const inputName = document.getElementById('input-name');
  const inputPrice = document.getElementById('input-price');
  const inputFile = document.getElementById('input-file');
  const btnDownload = document.getElementById('btn-download');

  const outputName = document.getElementById('output-name');
  const outputPrice = document.getElementById('output-price');
  const outputImage = document.getElementById('output-image');
  const robloxPrompt = document.getElementById('roblox-prompt');

  // Caps name update rendering at 40 characters maximum length
  inputName.addEventListener('input', () => {
    if (inputName.value.length > 40) {
      inputName.value = inputName.value.slice(0, 40);
    }
    outputName.textContent = `"${inputName.value}"`;
  });

  // Limits the input and visual display strictly to 14 numbers max
  inputPrice.addEventListener('input', () => {
    if (inputPrice.value.length > 14) {
      inputPrice.value = inputPrice.value.slice(0, 14);
    }
    outputPrice.textContent = inputPrice.value;
  });

  inputFile.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(event) {
        outputImage.src = event.target.result;
        outputImage.style.display = 'block';
      }
      reader.readAsDataURL(file);
    }
  });

  btnDownload.addEventListener('click', () => {
    const fileName = inputName.value ? `roblox_prompt_${inputName.value.replace(/\s+/g, '_')}.png` : 'roblox_prompt.png';

    html2canvas(robloxPrompt, {
      backgroundColor: null,
      scale: 3
    }).then(canvas => {
      const link = document.createElement('a');
      link.download = fileName;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  });
</script>

</body>
</html>
